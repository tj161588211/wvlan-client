name: CI Build - WVLAN

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]

jobs:
  build-client:
    name: Build WPF Client
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.8'

      - name: Build C++ Core (CMake)
        working-directory: wvlan-client
        run: |
          mkdir -p build
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
        continue-on-error: true

      - name: Build WPF Client
        working-directory: wvlan-client/src/WpfClient
        run: |
          dotnet build WpfClient.csproj --configuration Release

      - name: Upload Client Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wvlan-client
          path: wvlan-client/src/WpfClient/bin/Release/net8.0-windows/
          retention-days: 7

  build-server:
    name: Build Control Server
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

- name: Setup Go
uses: actions/setup-go@v5
with:
go-version: '1.21.x'
cache: false

      - name: Tidy Go module
        working-directory: control-server
        run: |
          go get gorm.io/gorm@v1.25.5
          go get gorm.io/driver/postgres@v1.5.4
          go mod tidy
          go mod download
          # Verify go.sum is generated
          if [ ! -s go.sum ]; then
            echo "ERROR: go.sum is empty or missing!"
            exit 1
          fi
          echo "go.sum generated successfully with $(wc -l < go.sum) lines"

      - name: Build Server
        working-directory: control-server
        run: |
          go build -o bin/server.exe ./cmd/server

      - name: Upload Server Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: control-server
          path: control-server/bin/server.exe
          retention-days: 7

  build-installer:
    name: Build Installer
    runs-on: windows-latest
    needs: [build-client, build-server]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Client Artifacts
        uses: actions/download-artifact@v4
        with:
          name: wvlan-client
          path: dist/client/

      - name: Download Server Artifacts
        uses: actions/download-artifact@v4
        with:
          name: control-server
          path: dist/server/

      - name: Setup NSIS
        uses: jasonetco/setup-nsis@v1
        continue-on-error: true

      - name: Build Installer (NSIS)
        working-directory: installer/nsis
        run: |
          makensis /V1 build.nsi
        continue-on-error: true

      - name: Setup Inno Setup
        uses: crazy-max/ghaction-innosetup@v3
        continue-on-error: true

      - name: Build Installer (Inno Setup)
        working-directory: installer/innosetup
        run: |
          iscc setup.iss /Ooutput/
        continue-on-error: true

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: wvlan-installer
          path: |
            installer/nsis/output/*.exe
            installer/innosetup/Output/*.exe
          retention-days: 7

  create-release:
    name: Create Release
    runs-on: windows-latest
    needs: build-installer
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Installer
        uses: actions/download-artifact@v4
        with:
          name: wvlan-installer

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
