name: CI Build - WVLAN

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]

jobs:
  build-client:
    name: Build WPF Client
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup C++ (vcpkg)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '57d6645a77e70eb5d7c9e8f5e5d5e5d5e5d5e5d5'

      - name: Restore C++ dependencies
        working-directory: wvlan-client
        run: |
          vcpkg install wireguard:x64-windows
          vcpkg integrate install

      - name: Build C++ Core
        working-directory: wvlan-client
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Build WPF Client
        working-directory: wvlan-client
        run: |
          dotnet build wvlan-client.sln --configuration Release

      - name: Upload Client Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wvlan-client
          path: wvlan-client/bin/Release/net8.0-windows/
          retention-days: 7

  build-server:
    name: Build Control Server
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.x'
          cache: true

      - name: Restore Go dependencies
        working-directory: control-server
        run: go mod download

      - name: Build Server
        working-directory: control-server
        run: |
          go build -o bin/server.exe ./cmd/server

      - name: Upload Server Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: control-server
          path: control-server/bin/server.exe
          retention-days: 7

  build-installer:
    name: Build Installer
    runs-on: windows-latest
    needs: [build-client, build-server]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Client Artifacts
        uses: actions/download-artifact@v4
        with:
          name: wvlan-client
          path: dist/client/

      - name: Download Server Artifacts
        uses: actions/download-artifact@v4
        with:
          name: control-server
          path: dist/server/

      - name: Setup NSIS
        uses: jasonetco/setup-nsis@v1

      - name: Build Installer (NSIS)
        working-directory: installer/nsis
        run: |
          makensis /V1 build.nsi
        continue-on-error: true

      - name: Build Installer (Inno Setup)
        working-directory: installer/innosetup
        run: |
          iscc setup.iss
        continue-on-error: true

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: wvlan-installer
          path: |
            installer/nsis/output/*.exe
            installer/innosetup/Output/*.exe
          retention-days: 7

  create-release:
    name: Create Release
    runs-on: windows-latest
    needs: build-installer
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Installer
        uses: actions/download-artifact@v4
        with:
          name: wvlan-installer

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
